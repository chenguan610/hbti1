<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HPTI人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e1a29;
            background-image: radial-gradient(circle at 20% 10%, #332b40 0%, transparent 35%),
                radial-gradient(circle at 80% 90%, #2d2740 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            padding: 16px;
            color: #e8e0f0;
        }
        .container {
            width: 100%;
            max-width: 620px;
            background: rgba(30, 25, 40, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 150, 0.2);
            border: 1px solid rgba(255, 210, 130, 0.2);
            transition: all 0.2s ease;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 8px #daa06a);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d390, #e6a4b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #bcacc4;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .progress-wrap {
            margin: 10px 0 20px;
        }
        .progress-bar {
            height: 6px;
            background: #3b3448;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e6b87a, #c97bbf);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .progress-num {
            text-align: right;
            font-size: 12px;
            color: #9b8eaa;
            margin-top: 6px;
        }
        .question-card {
            background: rgba(45, 35, 55, 0.7);
            border-radius: 20px;
            padding: 20px 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(215, 185, 140, 0.25);
            animation: fadeUp 0.35s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .q-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #f1e5ff;
            line-height: 1.5;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .opt-btn {
            background: rgba(60, 45, 75, 0.8);
            border: 1.5px solid rgba(190, 150, 130, 0.5);
            border-radius: 14px;
            padding: 12px 14px;
            color: #e3d7f0;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
        }
        .opt-btn:hover {
            border-color: #dba970;
            background: rgba(80, 55, 95, 0.7);
            transform: translateY(-1px);
        }
        .opt-btn.selected {
            background: rgba(200, 140, 80, 0.25);
            border-color: #e6b87a;
            box-shadow: 0 0 14px rgba(230, 170, 100, 0.3);
            color: #ffe5c4;
            font-weight: 600;
        }
        .opt-btn.opt-mid {
            border-style: dashed;
            opacity: 0.8;
        }
        .opt-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 215, 150, 0.2);
            font-weight: bold;
            font-size: 12px;
            color: #f9d390;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 1px;
        }
        .opt-btn.selected .opt-letter {
            background: #dba05a;
            color: #1e1826;
        }
        .opt-text {
            flex: 1;
            min-width: 0;
        }
        .opt-intensity {
            font-size: 10px;
            color: #9b8eaa;
            margin-left: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 12px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-primary {
            background: #dba05a;
            color: #1e1826;
            box-shadow: 0 4px 16px rgba(230, 160, 70, 0.4);
        }
        .btn-primary:hover {
            background: #e6b46c;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #9b8eaa;
            color: #ddd;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9b8d8;
        }
        .result-area {
            animation: fadeUp 0.5s ease;
        }
        .result-badge {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        .result-emoji {
            font-size: 70px;
        }
        .result-code {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #f5c98e, #dd9ab0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 8px 0;
        }
        .result-name {
            font-size: 26px;
            font-weight: 700;
            color: #f3e0ff;
        }
        .rarity-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .rarity-common {
            background: rgba(176, 160, 192, 0.2);
            color: #b0a0c0;
            border: 1px solid rgba(176, 160, 192, 0.4);
        }
        .rarity-rare {
            background: rgba(126, 200, 160, 0.2);
            color: #7ec8a0;
            border: 1px solid rgba(126, 200, 160, 0.4);
        }
        .rarity-epic {
            background: rgba(201, 123, 191, 0.2);
            color: #c97bbf;
            border: 1px solid rgba(201, 123, 191, 0.4);
        }
        .rarity-legendary {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
            border: 1px solid rgba(255, 170, 0, 0.4);
            animation: glowPulse 2s ease-in-out infinite;
        }

        .match-section {
            background: rgba(45, 32, 55, 0.8);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 16px 0;
            border: 1px solid rgba(215, 185, 140, 0.3);
            text-align: center;
        }
        .match-label {
            font-size: 12px;
            color: #9b8eaa;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .match-percent {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #f9d390, #e6b87a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 6px;
        }
        .match-percent.perfect {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                filter: drop-shadow(0 0 6px rgba(255, 170, 0, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 16px rgba(255, 170, 0, 0.9));
            }
        }
        .match-bar-outer {
            height: 8px;
            background: #3b3448;
            border-radius: 10px;
            overflow: hidden;
            margin: 8px auto;
            max-width: 300px;
        }
        .match-bar-inner {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease;
            background: linear-gradient(90deg, #dba05a, #f9d390);
        }
        .match-bar-inner.perfect {
            background: linear-gradient(90deg, #ffaa00, #ffd700);
            box-shadow: 0 0 12px rgba(255, 170, 0, 0.5);
        }
        .match-detail {
            font-size: 12px;
            color: #b0a0c0;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .match-detail span {
            color: #f5d7b0;
            font-weight: 600;
        }
        .dim-match-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
        }
        .dim-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .dim-dot.hit {
            background: rgba(219, 160, 90, 0.35);
            color: #f9d390;
            border: 2px solid rgba(249, 211, 144, 0.7);
            box-shadow: 0 0 8px rgba(219, 160, 90, 0.3);
        }
        .dim-dot.miss {
            background: rgba(120, 100, 140, 0.2);
            color: #7b6e8a;
            border: 2px solid rgba(150, 130, 160, 0.3);
        }

        .result-desc {
            background: rgba(45, 32, 55, 0.7);
            border-radius: 18px;
            padding: 20px;
            margin: 16px 0;
            border-left: 4px solid #dba05a;
            font-size: 14px;
            line-height: 1.7;
            color: #ddd;
            word-break: break-word;
        }
        .result-summary {
            background: rgba(60, 45, 75, 0.6);
            border-radius: 14px;
            padding: 14px 16px;
            margin: 12px 0;
            font-size: 13px;
            color: #e5d7f5;
            line-height: 1.6;
            border: 1px dashed rgba(219, 160, 90, 0.3);
        }
        .result-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .trait-tag {
            background: rgba(220, 165, 100, 0.2);
            color: #f5d7b0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        .share-box {
            background: #2c2338;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
            border: 1px dashed #6e5c78;
        }
        .share-text {
            background: transparent;
            border: none;
            color: #cdc0e0;
            width: 100%;
            font-size: 13px;
            resize: none;
            text-align: center;
            font-family: inherit;
            outline: none;
            word-break: break-word;
        }
        .copy-btn {
            margin-top: 10px;
            background: #453750;
            border: none;
            color: #f0e2ff;
            padding: 8px 24px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #5d4b6e;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #dba05a;
            color: #1e1826;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        @media (max-width: 450px) {
            .container {
                padding: 20px 14px;
            }
            .result-code {
                font-size: 32px;
                letter-spacing: 4px;
            }
            .match-percent {
                font-size: 38px;
            }
            .opt-btn {
                font-size: 13px;
                padding: 10px 12px;
            }
            .q-text {
                font-size: 14px;
            }
            .opt-letter {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <span class="emoji">🔮🪞</span>
            <h1>HPTI人格测试</h1>
            <div class="subtitle">隐藏人格类型指标 · 36型隐秘人格</div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-num" id="progressText">第 1/12 题</div>
        </div>
        <div id="questionContainer"></div>
        <div class="nav-btns" id="navButtons">
            <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()" style="display:none;">← 上一题</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
            <button class="btn btn-primary" id="submitBtn" onclick="calcResult()" style="display:none;">🔎 揭示人格</button>
        </div>
        <div id="resultContainer" class="result-area" style="display:none;"></div>
    </div>
    <div class="toast" id="toast">✅ 已复制</div>

    <script>
        // ===================== 题库 (每维6题，每题5选项) =====================
        // 选项分数: A=+2, B=+1, C=0, D=-1, E=-2 (正分=倾向第一个字母)
        const allQuestions = [
            // dim: sex (O=开放 vs R=压抑)
            { dim: "sex", text: "面对一个浑身散发魅力的陌生人，你的本能反应是？", optA: "直接脑补一整部浪漫电影，甚至想主动出击", optB: "多看几眼，心里有点小波动", optC: "没什么特别感觉，和平常一样", optD: "有点不自在，假装在看风景", optE: "立刻回避目光，心跳加速只想逃离" },
            { dim: "sex", text: "关于那些不可描述的幻想，你通常？", optA: "丰富多彩，觉得是人类瑰宝，甚至可以写成小说", optB: "偶尔会有，觉得挺正常的", optC: "说不上来，没太注意过", optD: "很少出现，出现了也会赶紧转移注意力", optE: "几乎不幻想，觉得那方面的事有点羞耻" },
            { dim: "sex", text: "有人突然开黄腔，你的反应？", optA: "接梗王上线，车速直接飙到180", optB: "跟着笑一笑，觉得挺有趣", optC: "看情况，有时候接有时候装傻", optD: "有点尴尬，低头玩手机", optE: "瞬间脸红，想找个地缝钻进去" },
            { dim: "sex", text: "和好朋友聊到亲密话题时，你？", optA: "坦然分享心得，甚至可以开研讨会", optB: "适度聊聊，不会刻意回避", optC: "看对方聊什么再决定参不参与", optD: "尽量岔开话题，不太自在", optE: "坚决不聊，这是我的绝对禁区" },
            { dim: "sex", text: "看到街上有情侣热吻，你？", optA: "内心赞叹“真甜啊”，甚至想鼓掌", optB: "觉得挺正常，年轻人嘛", optC: "没什么特别感觉", optD: "觉得有点过了，公共场合注意点", optE: "快速走过并小声嘀咕“有伤风化”" },
            { dim: "sex", text: "你更认同下面哪句？", optA: "欲望是生命的燃料，坦坦荡荡没什么好藏的", optB: "适度表达欲望是健康的", optC: "每个人不一样，不好说", optD: "有些欲望适合藏在心里", optE: "欲望是麻烦的源头，最好清心寡欲" },

            // dim: social (E=外向 vs I=内向)
            { dim: "social", text: "周五晚上收到聚会邀请，你的第一反应？", optA: "立刻回复“马上到！”，顺便问能不能多带几个朋友", optB: "挺开心的，答应参加", optC: "看看当天状态再决定", optD: "有点犹豫，需要做心理建设", optE: "开始编造理由：“哎呀我家猫今天心情不好”" },
            { dim: "social", text: "和不熟的人共处一室，你感觉？", optA: "舒服，甚至可以开启话痨模式", optB: "还行，能聊几句", optC: "看对方是什么人", optD: "有点局促，不太知道说什么", optE: "度秒如年，空气仿佛凝固，想原地消失" },
            { dim: "social", text: "团建的时候你通常？", optA: "自动成为气氛组，组织游戏唱K一条龙", optB: "积极参与，配合大家", optC: "随大流，不主动也不拒绝", optD: "安静跟着，需要时才发言", optE: "默默坐在角落，祈祷别点到自己" },
            { dim: "social", text: "理想周末是？", optA: "约三五好友，户外浪到飞起", optB: "和朋友吃个饭聚聚", optC: "看心情，可能出门可能宅", optD: "大部分时间独处，偶尔见人", optE: "手机静音，与世隔绝，被窝即天堂" },
            { dim: "social", text: "在电梯遇到半熟不熟的人，你会？", optA: "主动打招呼，顺便聊几句天气", optB: "微笑点头，说声你好", optC: "看对方反应再决定", optD: "假装看手机，避免眼神接触", optE: "紧盯楼层数字，心里默念“快开门快开门”" },

            // dim: emotion (S=稳定 vs N=敏感)
            { dim: "emotion", text: "被老板当众批评后，你？", optA: "冷静分析哪里错了，五分钟后就没事了", optB: "稍微有点不舒服，但很快调整好", optC: "当时有点情绪，过会儿就好了", optD: "心里难受挺久，反复回想", optE: "表面镇定，内心已开始写辞职信并幻想流浪" },
            { dim: "emotion", text: "看完一部催泪电影，你通常？", optA: "感动归感动，转头就忘了", optB: "有点感触，但不影响心情", optC: "当时挺感动，第二天就好了", optD: "情绪起伏较大，需要缓一缓", optE: "哭到隐形眼镜都掉了，三天缓不过来" },
            { dim: "emotion", text: "别人说你“太敏感了”，你的反应？", optA: "完全不在意，觉得对方不了解自己", optB: "稍微想想，但不会纠结", optC: "看是谁说的，重要的人会反思一下", optD: "有点受伤，开始反思自己", optE: "瞬间emo，开始怀疑人生的意义" },
            { dim: "emotion", text: "计划突然改变时，你？", optA: "没事，随机应变是我的中间名", optB: "调整一下就好了", optC: "需要一点时间适应", optD: "有点烦躁但能接受", optE: "内心已崩溃，表面还得保持微笑" },
            { dim: "emotion", text: "深夜一个人时，你容易？", optA: "倒头就睡，睡眠质量一级棒", optB: "想想明天的事就睡了", optC: "偶尔会想东想西", optD: "经常复盘今天说错的每一句话", optE: "越想越清醒，焦虑到失眠" },
            { dim: "emotion", text: "朋友开玩笑过火时，你？", optA: "当场怼回去，或者一笑了之", optB: "笑笑就算了", optC: "心里有点介意但不会说", optD: "表面跟着笑，心里不太舒服", optE: "表面跟着笑，心里已记在小本本上了" },

            { code: "RISPTA", name: "冰火两重天", emoji: "🧊🔥", rarity: "rare", desc: "极度内向稳定，外表冰山，内心熔岩。压抑的激情只在特定场合喷发，反差大到让人震惊。", traits: ["反差萌", "冷静疯批", "深情闷骚", "爆发力强"], summary: "压抑+内向+稳定+行动派+理性+冒险 = 极地火山。冷到极致的外壳下，是足以融化一切的热情，只是开关隐秘。" },
            { code: "RISNTC", name: "古墓派守墓人", emoji: "🏚️", rarity: "rare", desc: "安静敏感又谨慎，像生活在古墓里。你与世无争，只想在自己的小世界里安静养老。", traits: ["宅神", "社恐十级", "内心平和", "古董生活"], summary: "压抑+内向+稳定+拖延+感性+谨慎 = 现代隐士。你在大都市里活出了深山老林的气质，外卖是唯一的文明链接。" },
            { code: "RILNTA", name: "流泪垃圾桶", emoji: "🗑️", rarity: "epic", desc: "敏感拖延还压抑，经常感觉自己是个情绪垃圾桶。你看喜剧会哭，看悲剧更哭，感动自己第一人。", traits: ["泪腺发达", "忧郁诗人", "自我感动", "悲伤逆流成河"], summary: "压抑+内向+敏感+拖延+感性+冒险 = 行走的眼泪制造机。你的悲伤是全方位的，连幸福都让你感动到落泪。" },
            { code: "OILNTC", name: "悄悄享乐主义者", emoji: "🍰", rarity: "common", desc: "内向谨慎，但私下非常懂得享受。你一个人吃大餐、看电影、旅行，快乐从不需要观众。", traits: ["独乐乐", "隐秘的放纵", "精致社恐", "自我宠溺"], summary: "开放+内向+敏感+拖延+感性+谨慎 = 隐蔽的快乐星球主。你精心经营着自己的小宇宙，外人只看到安静的表面。" },
            { code: "OILPTA", name: "浪子回头金不换", emoji: "🎸", rarity: "rare", desc: "随性内向，灵感来了谁也拦不住。你活得像一阵风，吹过就走，留下一地才华和没洗的袜子。", traits: ["浪子气质", "即兴创作", "拖延艺术家", "不羁生活"], summary: "开放+内向+稳定+拖延+理性+冒险 = 灵感型流浪者。你追逐内心的风，却常常忘记洗袜子和回消息。" },
            { code: "OISNTC", name: "人间观察员", emoji: "🦉", rarity: "common", desc: "内向稳重，静静观察世间万物。你有一双洞察一切的眼睛，和一张永远闭着的嘴。", traits: ["暗中观察", "沉默智者", "内心弹幕", "佛系点评"], summary: "开放+内向+稳定+行动派+感性+谨慎 = 社会实验记录者。你收集人间百态，但从不发表论文，只在自己心里存档。" },
            { code: "RILPT2", name: "摆烂但没完全摆", emoji: "🧩", rarity: "rare", desc: "你想躺平，但潜意识还在挣扎。每次说要放弃，身体却很诚实地继续努力，是矛盾本盾。", traits: ["仰卧起坐", "摆烂未遂", "口是心非", "间歇性努力"], summary: "压抑+内向+稳定+拖延+理性+谨慎 = 奋斗型咸鱼。你嘴上说着算了，身体却在deadline前爆发出惊人的执行力。" },
            { code: "RELNTC", name: "活体矛盾指南", emoji: "🎲", rarity: "epic", desc: "身上全是矛盾：想社交又怕人，想躺平又焦虑，想恋爱又嫌麻烦。你就是一本行走的纠结教科书。", traits: ["选择困难", "内心战争", "拖延又自责", "纠结之王"], summary: "压抑+外向+敏感+拖延+感性+谨慎 = 矛盾综合体。你的内心永远有两个小人在打架，而你是那个吃瓜的围观群众。" },
            { code: "RELPTC", name: "终极废物逆袭", emoji: "🐛", rarity: "epic", desc: "拖延且压抑，但关键时刻总能爆发小宇宙。你是那种平时像虫，关键时刻化龙的神奇生物。", traits: ["死线奇迹", "逆袭专业户", "隐藏大佬", "深藏不露"], summary: "压抑+外向+稳定+拖延+理性+谨慎 = 沉睡的哥斯拉。平时的你是个懒散小透明，直到危机来临才展现真正的力量。" },
            { code: "OESNT2", name: "快乐沙雕", emoji: "🤪", rarity: "common", desc: "开放外向，感性冲动，快乐至上。你的存在就是为了证明，人类智商的下限可以有多低，快乐就可以有多高。", traits: ["沙雕网友", "快乐病毒", "智商掉线", "气氛组组长"], summary: "开放+外向+敏感+行动派+感性+冒险 = 快乐制造机。你的人生信条是：笑就完了，想那么多干嘛？" },
            { code: "OELPT2", name: "聪明绝顶的懒虫", emoji: "🦥", rarity: "rare", desc: "懒到极致却效率奇高，能用一分钟解决的绝不用两分钟。你的人生智慧是：懒，才是第一生产力。", traits: ["懒人科技", "效率鬼才", "最省力法则", "优雅摸鱼"], summary: "开放+外向+稳定+拖延+理性+谨慎 = 懒惰界的爱因斯坦。你为了能多躺一会，愿意动脑找出最快完成工作的办法。" },
            { code: "RISNTA", name: "斯文败类预备役", emoji: "🎩", rarity: "legendary", desc: "表面文质彬彬，内心暗流涌动。你压抑着破坏欲，随时可能撕破正经面具，吓所有人一跳。", traits: ["衣冠禽兽", "压抑的疯狂", "斯文外表", "内心野兽"], summary: "压抑+内向+敏感+行动派+感性+冒险 = 伪装成绵羊的狼。你彬彬有礼的外表下，藏着一个随时可能出笼的野兽。" },
            { code: "OILPTC", name: "精致废物点心", emoji: "🍮", rarity: "rare", desc: "内向、拖延、谨慎，却追求生活品质。你是那种连摆烂都要摆得漂漂亮亮的人，废物也要做最精致的那一个。", traits: ["精致穷", "仪式感废物", "美观第一", "拖延美学"], summary: "开放+内向+稳定+拖延+感性+谨慎 = 美学型躺平专家。你连颓废都要保持优雅，是废墟里开出的花。" }
        ];

        const personalityMap = new Map(personalityDB.map(p => [p.code, p]));
        const rarityNames = { common: "常见", rare: "稀有", epic: "史诗", legendary: "传说" };

        function computeCodeAndMatch() {
            const scores = { sex: 0, social: 0, emotion: 0, action: 0, think: 0, adventure: 0 };
            questions.forEach((q, idx) => {
                const ans = answers[idx];
                if (ans && scoreMap[ans] !== undefined) {
                    scores[q.dim] += scoreMap[ans];
                }
            });
            // 每个维度总分>0则赋第一个字母，否则第二个字母
            let userCode = "";
            dimKeys.forEach(dim => {
                userCode += (scores[dim] > 0) ? dimFirstLetter[dim] : dimSecondLetter[dim];
            });

            let bestPersonality = null;
            let bestDist = Infinity;
            if (personalityMap.has(userCode)) {
                bestPersonality = personalityMap.get(userCode);
                bestDist = 0;
            } else {
                for (let p of personalityDB) {
                    let dist = 0;
                    for (let i = 0; i < 6; i++) {
                        if (userCode[i] !== p.code[i]) dist++;
                    }
                    if (dist < bestDist) { bestDist = dist;
                        bestPersonality = p; }
                }
            }

            const matchPercent = Math.round(((6 - bestDist) / 6) * 100);
            const dimHits = {};
            dimKeys.forEach((dim, i) => {
                dimHits[dim] = (userCode[i] === bestPersonality.code[i]);
            });

            return { userCode, bestPersonality, matchPercent, dimHits, bestDist, scores };
        }

        const qContainer = document.getElementById('questionContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultContainer = document.getElementById('resultContainer');

        function renderQuestion() {
            if (currentQ >= questions.length) return;
            const q = questions[currentQ];
            const selected = answers[currentQ];
            const optKeys = ['A', 'B', 'C', 'D', 'E'];
            const optValues = [q.optA, q.optB, q.optC, q.optD, q.optE];

            let optionsHTML = '';
            optKeys.forEach((key, i) => {
                const isMid = (key === 'C');
                const isSel = (selected === key);
                optionsHTML += `
            <div class="opt-btn${isMid ? ' opt-mid' : ''}${isSel ? ' selected' : ''}" onclick="selectAnswer('${key}')">
              <span class="opt-letter">${key}</span>
              <span class="opt-text">${optValues[i]}</span>
              <span class="opt-intensity">${intensityLabels[i]}</span>
            </div>`;
            });

            qContainer.innerHTML = `
          <div class="question-card">
            <div class="q-text">${currentQ+1}. ${q.text}</div>
            <div class="options">${optionsHTML}</div>
          </div>`;
            updateNavButtons();
            updateProgress();
        }

        function selectAnswer(choice) { answers[currentQ] = choice;
            renderQuestion(); }

        function updateNavButtons() {
            prevBtn.style.display = currentQ === 0 ? 'none' : 'inline-block';
            if (currentQ === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
                submitBtn.disabled = answers.includes(null);
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
                nextBtn.disabled = (answers[currentQ] === null);
            }
        }

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const pct = Math.round((answered / questions.length) * 100);
            progressFill.style.width = pct + '%';
            progressText.textContent = `第 ${currentQ+1}/${questions.length} 题`;
        }

        function nextQuestion() { if (currentQ < questions.length - 1 && answers[currentQ] !== null) { currentQ++;
                renderQuestion(); } }

        function prevQuestion() { if (currentQ > 0) { currentQ--;
                renderQuestion(); } }

        function calcResult() {
            if (answers.includes(null)) return;
            const { userCode, bestPersonality, matchPercent, dimHits, bestDist } = computeCodeAndMatch();
            const personality = bestPersonality;
            const isPerfect = matchPercent === 100;
            const rarity = personality.rarity;
            const rarityName = rarityNames[rarity];
            const rarityClass = 'rarity-' + rarity;

            qContainer.innerHTML = '';
            document.getElementById('navButtons').style.display = 'none';
            document.querySelector('.progress-wrap').style.display = 'none';
            resultContainer.style.display = 'block';

            const dimOrder = ["sex", "social", "emotion", "action", "think", "adventure"];
            const dimDotHTML = dimOrder.map(dim => {
                const hit = dimHits[dim];
                const letter = personality.code[dimOrder.indexOf(dim)];
                return `<span class="dim-dot ${hit ? 'hit' : 'miss'}" title="${dimLabels[dim].first} / ${dimLabels[dim].second}">${letter}</span>`;
            }).join('');

            const hitCount = 6 - bestDist;
            const matchEmoji = isPerfect ? '🎯' : (matchPercent >= 83 ? '👍' : (matchPercent >= 67 ? '🤔' : '🔍'));

            resultContainer.innerHTML = `
          <div class="result-badge">
            <div class="result-emoji">${personality.emoji}</div>
            <div class="result-code">${personality.code}</div>
            <div class="result-name">${personality.name}</div>
            <span class="rarity-badge ${rarityClass}">${rarityName}</span>
          </div>
          <div class="match-section">
            <div class="match-label">${matchEmoji} 命中匹配度</div>
            <div class="match-percent${isPerfect ? ' perfect' : ''}">${matchPercent}%</div>
            <div class="match-bar-outer">
              <div class="match-bar-inner${isPerfect ? ' perfect' : ''}" style="width:${matchPercent}%;"></div>
            </div>
            <div class="match-detail">
              6个维度命中 <span>${hitCount}/6</span>${isPerfect ? ' · 完美命中！你就是这个剧本的主角' : (bestDist === 1 ? ' · 仅1个维度略有偏差，但已足够精准' : ' · ' + bestDist + '个维度存在差异，但这就是真实的你')}
            </div>
            <div class="dim-match-row">${dimDotHTML}</div>
            <div style="font-size:10px;color:#6e5c78;margin-top:6px;letter-spacing:1px;">
              ${dimOrder.map(dim => dimLabels[dim].first + '/' + dimLabels[dim].second).join(' · ')}
            </div>
          </div>
          <div class="result-desc">${personality.desc}</div>
          <div class="result-summary">💡 <strong>性格核心解析：</strong>${personality.summary}</div>
          <div class="result-traits">
            ${personality.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
          </div>
          <div class="share-box">
            <p style="color:#bcacc4; margin-bottom:8px;">📤 分享你的HPTI人格</p>
            <textarea class="share-text" id="shareText" readonly rows="5">🔮 我的HPTI人格：${personality.code} 「${personality.name}」${personality.emoji}
        稀有度：${rarityName} | 命中匹配度：${matchPercent}%（${hitCount}/6维度命中）
        ${personality.desc}
        来测测你的HPTI隐秘人格类型！</textarea>
            <button class="copy-btn" onclick="copyShare()">📋 复制文案</button>
          </div>
          <div style="text-align:center; margin-top:24px;">
            <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试（换一批题）</button>
          </div>`;
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function copyShare() {
            const ta = document.getElementById('shareText');
            if (ta) {
                ta.select();
                ta.setSelectionRange(0, 99999);
                navigator.clipboard.writeText(ta.value).then(() => {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                }).catch(() => {
                    document.execCommand('copy');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                });
            }
        }

        function restartTest() {
            questions = generateRandomQuestions();
            answers = new Array(12).fill(null);
            currentQ = 0;
            resultContainer.style.display = 'none';
            resultContainer.innerHTML = '';
            document.getElementById('navButtons').style.display = 'flex';
            document.querySelector('.progress-wrap').style.display = 'block';
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        questions = generateRandomQuestions();
        renderQuestion();
    </script>
</body>
